name: One-time cleanup of old contents

# TEMPORARY — removes the leftover contents collection from the dividend-sniper
# database, then this file is deleted. Guarded by the script's safety checks.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/cleanup.yml'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Remove leftover contents from dividend-sniper
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          CONFIRM_CLEANUP: "yes"
        run: node scripts/cleanup-old-contents.mjs
