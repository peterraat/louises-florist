name: One-time content migration

# TEMPORARY workflow — copies Louise's content into its own louisesflorist
# database, then this file is deleted. Uses the current MONGODB_URI secret.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/migrate.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Copy content into the louisesflorist database
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: node scripts/migrate-content.mjs
