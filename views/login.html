<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin sign in · {{BRAND}}</title>
<link rel="icon" type="image/png" href="/images/louises-florist-logo-badge.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#2b8f9b; --teal-dk:#1f6f79; --cream:#f3f8f9; --ink:#26383c; --ink-soft:#5d7176; --line:#d5e4e6; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    font-family:'Montserrat',-apple-system,'Segoe UI',Roboto,sans-serif; color:var(--ink);
    background:linear-gradient(140deg,#cbe7ea 0%,#edf6f7 50%,#d8ecec 100%); }
  .card{ width:100%; max-width:390px; background:#fff; border-radius:20px; padding:34px 30px;
    box-shadow:0 24px 60px rgba(31,60,64,.18); border:1px solid var(--line); text-align:center; }
  .badge{ height:66px; width:auto; display:block; margin:0 auto 10px; }
  .brand-name{ font-size:24px; font-weight:800; letter-spacing:-.02em; }
  .brand-name .r{ color:var(--teal); }
  h1{ font-size:14px; margin:14px 0 22px; color:var(--ink-soft); font-weight:600; letter-spacing:.02em; }
  form{ text-align:left; }
  label{ display:block; font-size:12px; font-weight:700; margin-bottom:6px; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:.06em; }
  input{ width:100%; font:inherit; padding:.7em .85em; border:1px solid var(--line); border-radius:12px; background:var(--cream); }
  input:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(43,143,155,.2); background:#fff; }
  button{ width:100%; margin-top:18px; font:inherit; font-weight:700; padding:13px; border:none; border-radius:40px;
    background:var(--teal); color:#fff; cursor:pointer; transition:.2s; }
  button:hover{ background:var(--teal-dk); }
  button:disabled{ opacity:.6; cursor:not-allowed; }
  .trust{ display:flex; align-items:center; gap:8px; margin-top:16px; font-size:13px; font-weight:500; color:var(--ink-soft); text-transform:none; letter-spacing:0; cursor:pointer; }
  .trust input{ width:auto; margin:0; }
  .view-site{ display:block; text-align:center; margin-top:14px; color:var(--teal); font-size:13px; font-weight:600; text-decoration:none; }
  .view-site:hover{ color:var(--teal-dk); text-decoration:underline; }
  .err{ color:#b42318; font-size:13px; font-weight:600; margin-top:12px; min-height:1.1em; text-align:center; }
</style>
</head>
<body>
  <form class="card" id="f">
    <img class="badge" src="/images/louises-florist-logo-badge.png" alt="" onerror="this.remove()" />
    <div class="brand-name">{{BRAND_HTML}}</div>
    <h1>Admin sign in</h1>
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" autofocus />
    <div id="totp-wrap" style="display:none">
      <label for="totp" style="margin-top:14px;">Authenticator code</label>
      <input id="totp" autocomplete="one-time-code" maxlength="20" placeholder="6-digit code (or backup code)" />
    </div>
    <label class="trust"><input type="checkbox" id="trust" /> Trust this browser (stay signed in for 30 days)</label>
    <button type="submit" id="btn">Sign in</button>
    <a class="view-site" href="/">← View site</a>
    <p class="err" id="err"></p>
  </form>
<script>
  const f=document.getElementById('f'), pw=document.getElementById('pw'), btn=document.getElementById('btn'),
        err=document.getElementById('err'), totpWrap=document.getElementById('totp-wrap'), totp=document.getElementById('totp');
  let totpRequired=false;
  fetch('/api/login-config').then(r=>r.json()).then(c=>{ if(c.totp){ totpRequired=true; totpWrap.style.display='block'; } }).catch(()=>{});
  f.addEventListener('submit', async (e)=>{
    e.preventDefault(); err.textContent=''; btn.disabled=true; const t=btn.textContent; btn.textContent='Signing in…';
    try{
      const body={ password:pw.value, trust:document.getElementById('trust').checked }; if(totpRequired) body.totp=totp.value;
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(r.ok){ location.href='/admin'; return; }
      if(r.status===429){ err.textContent='Too many attempts — wait a few minutes.'; return; }
      const d=await r.json().catch(()=>({}));
      if(d.totp){ err.textContent='Incorrect authenticator code.'; totp.focus(); }
      else if(d.error==='Admin not configured'){ err.textContent='Admin not configured yet.'; }
      else { err.textContent='Incorrect password.'; }
    }catch(_){ err.textContent='Something went wrong. Try again.'; }
    finally{ btn.disabled=false; btn.textContent=t; }
  });
</script>
</body>
</html>
