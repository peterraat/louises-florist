<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>A wonderful site is coming · Louise's Florist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#05060f; color:#dfe6ff; text-align:center; padding:24px;
    font-family:'Montserrat',-apple-system,'Segoe UI',Roboto,sans-serif; }
  .img{ width:100%; max-width:1000px; border-radius:16px; display:block;
    box-shadow:0 30px 90px rgba(70,110,220,.35); }
  .contact{ margin-top:26px; font-size:1rem; line-height:1.7; max-width:600px; }
  .contact b{ color:#fff; }
  .call{ display:inline-block; margin-top:14px; padding:14px 30px; border-radius:999px;
    background:#2b8f9b; color:#fff; text-decoration:none; font-weight:700; font-size:1.05rem; }
  .call:hover{ background:#1f6f79; }
  .addr{ margin-top:14px; font-size:.85rem; color:#8ea0c8; letter-spacing:.02em; }
</style>
</head>
<body>
  <img class="img" src="/images/wonderful.jpg" alt="A wonderful site is coming" />
  <div class="contact">
    <b>Louise's Florist</b> — we're just adding a few finishing touches. Need flowers in the meantime? We'd love to help.
    <div><a class="call" id="call" href="tel:01992479794">📞 01992 479794</a></div>
    <div class="addr">53 High Street, Hoddesdon, EN11 8TQ</div>
  </div>
<script>
  // Use the current phone number from the editable content (works during maintenance).
  fetch('/api/content').then(function(r){return r.json();}).then(function(d){
    var p = d.contact && d.contact.phone;
    if(p){ var a=document.getElementById('call'); a.href='tel:'+String(p).replace(/\s+/g,''); a.textContent='📞 '+p; }
  }).catch(function(){});
</script>
</body>
</html>
