<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Back soon · Louise's Florist</title>
<style>
  :root{ --rose:#c94f7c; --ink:#3a2b31; --soft:#fff5f8; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    font-family:Georgia, "Times New Roman", serif; color:var(--ink);
    background:linear-gradient(160deg,#fff5f8,#ffeef3); }
  .card{ max-width:520px; text-align:center; background:#fff; border-radius:20px; padding:44px 34px;
    box-shadow:0 24px 60px rgba(201,79,124,.18); }
  .flower{ font-size:52px; }
  h1{ font-size:1.8rem; margin:14px 0 8px; color:var(--rose); }
  p{ font-size:1.05rem; line-height:1.6; margin:8px 0; }
  .call{ display:inline-block; margin:18px 0 6px; padding:14px 28px; border-radius:999px;
    background:var(--rose); color:#fff; text-decoration:none; font-weight:bold; font-size:1.1rem; }
  .addr{ font-size:.9rem; color:#8a7178; margin-top:18px; }
</style>
</head>
<body>
  <div class="card">
    <div class="flower">🌸</div>
    <h1>We'll be back very soon</h1>
    <p>Our website is having a quick tidy-up. In the meantime we'd love to help — please give the shop a call.</p>
    <a class="call" href="tel:01992479794">📞 01992 479794</a>
    <p class="addr">Louise's Florist · 53 High Street, Hoddesdon EN11 8TQ</p>
  </div>
</body>
</html>
